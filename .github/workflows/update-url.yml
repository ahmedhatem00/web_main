name: Update Server URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Server URL'
        required: true
        type: string
  repository_dispatch:
    types: [update-url]

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}   # استخدام ACCESS_TOKEN بدلاً من GITHUB_TOKEN

      - name: Get URL from secret or input
        id: get-url
        run: |
          if [ "${{ github.event.inputs.url }}" != "" ]; then
            echo "url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.LIVE_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Update config.js
        run: |
          mkdir -p public
          echo "// تحديث تلقائي بواسطة GitHub Actions" > public/config.js
          echo "// آخر تحديث: $(date -Iseconds)" >> public/config.js
          echo "window.SERVER_URL = '${{ steps.get-url.outputs.url }}';" >> public/config.js
          echo "console.log('✅ Server URL:', window.SERVER_URL);" >> public/config.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/config.js
          git commit -m "🔗 تحديث رابط السيرفر: ${{ steps.get-url.outputs.url }}" || echo "لا توجد تغييرات"
          git push