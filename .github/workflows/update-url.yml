name: Update Server URL
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Server URL'
        required: true
        type: string
  repository_dispatch:
    types: [update-url]

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}   # هام جداً
      - name: Get URL
        id: get-url
        run: |
          if [ "${{ github.event.inputs.url }}" != "" ]; then
            echo "url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.LIVE_URL }}" >> $GITHUB_OUTPUT
          fi
      - name: Update config.js
        run: |
          mkdir -p public
          cat > public/config.js << EOF
          // تحديث تلقائي بواسطة GitHub Actions - $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          window.SERVER_URL = '${{ steps.get-url.outputs.url }}';
          console.log('✅ Server URL:', window.SERVER_URL);
          EOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add public/config.js
          git commit -m "🔗 تحديث الرابط: ${{ steps.get-url.outputs.url }}" || echo "No changes"
          git push