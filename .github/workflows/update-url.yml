name: Update Server URL
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Server URL'
        required: true
        type: string
  repository_dispatch:
    types: [update-url]

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
      - name: Get URL
        id: get-url
        run: |
          if [ "${{ github.event.inputs.url }}" != "" ]; then
            echo "url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.LIVE_URL }}" >> $GITHUB_OUTPUT
          fi
      - name: Update config.js
        run: |
          mkdir -p public
          echo "// تحديث تلقائي بواسطة GitHub Actions" > public/config.js
          echo "window.SERVER_URL = '${{ steps.get-url.outputs.url }}';" >> public/config.js
          echo "console.log('✅ Server URL:', window.SERVER_URL);" >> public/config.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add public/config.js
          git commit -m "🔗 تحديث الرابط: ${{ steps.get-url.outputs.url }}" || echo "No changes"
          git push