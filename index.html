<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر تجريبي - دعم مباشر</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛍️ متجر تجريبي</h1>
      <p class="subtitle">تسوق بأمان مع دعم مباشر</p>
    </header>
    <div id="products"><div class="loading">⏳ جاري تحميل المنتجات...</div></div>
    <button id="clearCookiesBtn" class="clear-cookies">🗑️ مسح الكوكيز</button>
  </div>
  <div id="chatModal" class="chat-modal hidden">
    <div class="chat-container">
      <div class="chat-header"><span>💬 دعم العملاء</span><button id="closeChatBtn">✖</button></div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
        <label for="fileInput" class="file-label">📎</label>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button id="sendMsgBtn">إرسال</button>
      </div>
      <div class="chat-footer"><small>🔒 آمن | 🗑️ تحذف بعد شهر</small></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
